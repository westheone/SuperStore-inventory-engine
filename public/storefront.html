<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuperStore front Prototype</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>

  <body>
    <header>
      <div class="logo">SuperStore</div>
      <nav aria-label="Main Navigation">
        <ul>
          <li><a href="./storefront.html">Shop</a></li>
          <li><a href="./admin.html">Admin</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <div class="cart-search-grid">
        <section
          class="cart-details"
          style="grid-area: box-1"
          aria-label="Cart Summary"
        >
          <h2>Your Cart</h2>
          <div id="cart-detile-section">
            <!-- Cart detils load here -->
          </div>
        </section>

        <section
          class="search-container"
          style="grid-area: box-2"
          aria-label="Product Search"
        >
          <h1>Available Inventory</h1>
          <p>Browse our catalog of items.</p>
          <label id="search-label" for="storefront-search">Search items:</label>
          <input
            type="search"
            id="storefront-search"
            placeholder="Type to filter..."
            aria-labelledby="search-label"
          />
        </section>
      </div>

      <section aria-label="Product grid">
        <h2 id="grid-heading" class="visually-hidden">Product Catalog</h2>
        <div id="product-grid" class="product-grid">
          <!-- Products load here -->
        </div>
      </section>
    </main>

    <footer>
      <p>2026 SuperStore Prototype v1.0.5</p>
    </footer>
  </body>
</html>
