<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuperStore front Prototype</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>

  <body>
    <header>
      <div class="logo">SuperStore</div>
      <nav aria-label="Main Navigation">
        <ul>
          <li><a href="./storefront.html">Shop</a></li>
          <li><a href="./admin.html">Admin</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h1>Available Inventory</h1>
      <p>Browse our catalog of items in real-time.</p>

      <section class="search-container" aria-label="Product Search">
        <label id="search-label" for="storefront-search">Search items:</label>
        <input
          type="search"
          id="storefront-search"
          placeholder="Type to filter..."
          aria-labelledby="search-label"
        />
      </section>

      <section
        id="product-grid"
        class="product-grid"
        aria-labelledby="grid-heading"
      >
        <h2 id="grid-heading" class="visually-hidden">Product Catalog</h2>
      </section>
    </main>

    <aside aria-label="Cart Summary">
      <h2>Your Cart</h2>
      <p>Items: <strong>2</strong></p>
      <p>Total: <strong>$134.99</strong></p>
      <button type="button" class="checkout-btn">Proceed to Checkout</button>
    </aside>

    <footer>
      <p>2026 SuperStore Prototype v1.0.5</p>
    </footer>
  </body>
</html>
